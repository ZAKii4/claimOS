version: '3.8'

services:
  # -------------------------
  # Frontend Service (Next.js)
  # -------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: claimos-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - claimos_net

  # -------------------------
  # Backend Service (FastAPI)
  # -------------------------
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: claimos-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - claimos_net

  # -------------------------
  # Nginx Reverse Proxy
  # -------------------------
  nginx:
    image: nginx:alpine
    container_name: claimos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - claimos_net

  # -------------------------
  # Database (PostgreSQL)
  # -------------------------
  postgres:
    image: pgvector/pgvector:pg15
    container_name: claimos-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claimos_net

  # -------------------------
  # Cache & Messaging (Redis)
  # -------------------------
  redis:
    image: redis:7-alpine
    container_name: claimos-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claimos_net

  # -------------------------
  # Graph DB (Neo4j)
  # -------------------------
  neo4j:
    image: neo4j:5-community
    container_name: claimos-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "wget", "http://localhost:7474", "-O", "-"]
      interval: 20s
      timeout: 10s
      retries: 3
    networks:
      - claimos_net

  # -------------------------
  # Local AI (Ollama)
  # -------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: claimos-ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    # If deploying on a machine with NVIDIA GPU, uncomment the following:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - claimos_net

  # -------------------------
  # Virus Scanning (ClamAV)
  # -------------------------
  clamav:
    image: clamav/clamav:stable
    # No arm64 build is published for this image; emulated via Rosetta/qemu
    # on Apple Silicon Docker Desktop. Drop this line on an amd64 host.
    platform: linux/amd64
    container_name: claimos-clamav
    restart: unless-stopped
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - claimos_net

networks:
  claimos_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  ollama_models:
  clamav_data:
