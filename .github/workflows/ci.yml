name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secure_postgres_password_123
          POSTGRES_DB: claimos_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:secure_postgres_password_123@localhost:5433/claimos_db
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:secure_postgres_password_123@localhost:5433/claimos_db
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install poetry
        poetry install
    - name: Apply database migrations
      run: |
        cd backend
        poetry run alembic upgrade head
    - name: Run Pytest Suite
      run: |
        cd backend
        PYTHONPATH=. poetry run pytest tests/ -v

  build-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    - name: Build and Push Docker image
      run: |
        echo "Building claimos/backend:v1.0.0..."
        # docker build -t claimos/backend:v1.0.0 .
        # docker push claimos/backend:v1.0.0
