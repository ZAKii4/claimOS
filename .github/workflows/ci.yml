name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install poetry
        poetry install
    - name: Run Pytest Suite
      run: |
        cd backend
        PYTHONPATH=. poetry run pytest tests/ -v

  build-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    - name: Build and Push Docker image
      run: |
        echo "Building claimos/backend:v1.0.0..."
        # docker build -t claimos/backend:v1.0.0 .
        # docker push claimos/backend:v1.0.0
